<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Dual-Arm Chess Robot</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #202124;
      color: #f1f1f1;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }

    .board-wrap {
      display: grid;
      grid-template-columns: 28px 640px;
      grid-template-rows: 640px 28px;
      gap: 4px;
      user-select: none;
    }

    .rank-labels {
      display: grid;
      grid-template-rows: repeat(8, 1fr);
      height: 640px;
    }

    .rank-labels div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #ddd;
    }

    .file-labels {
      grid-column: 2;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: 640px;
    }

    .file-labels div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #ddd;
    }

    .board {
      width: 640px;
      height: 640px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 4px solid #111;
      box-shadow: 0 0 20px rgba(0,0,0,0.45);
    }

    .cell {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      cursor: pointer;
      position: relative;
    }

    .light {
      background: #f2efe7;
    }

    .dark {
      background: #2f7d55;
    }

    .cell.selected {
      outline: 5px solid #ffd84d;
      outline-offset: -5px;
    }

    .cell.target {
      outline: 5px solid #ff8a4d;
      outline-offset: -5px;
    }

    .cell:hover {
      filter: brightness(1.08);
    }

    .piece.white {
      color: #ffffff;
      text-shadow:
        -2px -2px 0 #333,
         2px -2px 0 #333,
        -2px  2px 0 #333,
         2px  2px 0 #333;
    }

    .piece.black {
      color: #333333;
      text-shadow:
        -1px -1px 0 #999,
         1px -1px 0 #999,
        -1px  1px 0 #999,
         1px  1px 0 #999;
    }

    .panel {
      width: 390px;
      background: #2b2c2f;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .panel h2 {
      margin-top: 0;
    }

    .info {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      min-width: 80px;
      color: #ffd84d;
      font-weight: bold;
    }

    button {
      padding: 12px 18px;
      margin: 6px 4px 6px 0;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4f8cff;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #3976e6;
    }

    button.secondary {
      background: #666;
    }

    button.secondary:hover {
      background: #777;
    }

    button.danger {
      background: #c94f4f;
    }

    button.danger:hover {
      background: #b43f3f;
    }

    #log {
      margin-top: 16px;
      background: #111;
      color: #ddd;
      padding: 14px;
      border-radius: 10px;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .note {
      color: #ccc;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="left">
    <h1>Dual-Arm Chess Robot</h1>

    <div class="board-wrap">
      <div class="rank-labels">
        <div>8</div>
        <div>7</div>
        <div>6</div>
        <div>5</div>
        <div>4</div>
        <div>3</div>
        <div>2</div>
        <div>1</div>
      </div>

      <div id="board" class="board"></div>

      <div></div>

      <div class="file-labels">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
        <div>e</div>
        <div>f</div>
        <div>g</div>
        <div>h</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>Move Controller</h2>

    <div class="info">
      <div><span class="badge">Start</span> <span id="startText">없음</span></div>
      <div><span class="badge">End</span> <span id="endText">없음</span></div>
      <div><span class="badge">Piece</span> <span id="pieceText">없음</span></div>
    </div>

    <button onclick="sendMove()">Move</button>
    <button class="secondary" onclick="resetSelection()">Selection Reset</button>
    <button class="danger" onclick="resetBoard()">Board Reset</button>

    <div class="note">
      현재 규칙 검사는 TOPST UART 연동 후 담당 예정.<br>
      지금 UI는 선택한 기물의 start/end/piece를 FastAPI로 보내고,
      서버가 <code>execute_move_8x8.sh</code>를 실행함.<br>
      실제 보드에서 목적 칸에 블록이 있으면 충돌할 수 있으니 시연 때는 목적 칸을 비워두는 게 안전함.
    </div>

    <div id="log">log...</div>
  </div>

  <script>
    const boardEl = document.getElementById("board");
    const startText = document.getElementById("startText");
    const endText = document.getElementById("endText");
    const pieceText = document.getElementById("pieceText");
    const logEl = document.getElementById("log");

    let selectedStart = null;
    let selectedEnd = null;

    const initialBoard = {
      A1: { symbol: "♖", type: "rook", color: "white" },
      B1: { symbol: "♘", type: "knight", color: "white" },
      C1: { symbol: "♗", type: "bishop", color: "white" },
      D1: { symbol: "♕", type: "queen", color: "white" },
      E1: { symbol: "♔", type: "king", color: "white" },
      F1: { symbol: "♗", type: "bishop", color: "white" },
      G1: { symbol: "♘", type: "knight", color: "white" },
      H1: { symbol: "♖", type: "rook", color: "white" },

      A2: { symbol: "♙", type: "pawn", color: "white" },
      B2: { symbol: "♙", type: "pawn", color: "white" },
      C2: { symbol: "♙", type: "pawn", color: "white" },
      D2: { symbol: "♙", type: "pawn", color: "white" },
      E2: { symbol: "♙", type: "pawn", color: "white" },
      F2: { symbol: "♙", type: "pawn", color: "white" },
      G2: { symbol: "♙", type: "pawn", color: "white" },
      H2: { symbol: "♙", type: "pawn", color: "white" },

      A8: { symbol: "♜", type: "rook", color: "black" },
      B8: { symbol: "♞", type: "knight", color: "black" },
      C8: { symbol: "♝", type: "bishop", color: "black" },
      D8: { symbol: "♛", type: "queen", color: "black" },
      E8: { symbol: "♚", type: "king", color: "black" },
      F8: { symbol: "♝", type: "bishop", color: "black" },
      G8: { symbol: "♞", type: "knight", color: "black" },
      H8: { symbol: "♜", type: "rook", color: "black" },

      A7: { symbol: "♟", type: "pawn", color: "black" },
      B7: { symbol: "♟", type: "pawn", color: "black" },
      C7: { symbol: "♟", type: "pawn", color: "black" },
      D7: { symbol: "♟", type: "pawn", color: "black" },
      E7: { symbol: "♟", type: "pawn", color: "black" },
      F7: { symbol: "♟", type: "pawn", color: "black" },
      G7: { symbol: "♟", type: "pawn", color: "black" },
      H7: { symbol: "♟", type: "pawn", color: "black" },
    };

    let boardState = {};

    function cloneInitialBoard() {
      boardState = {};
      for (const cell in initialBoard) {
        boardState[cell] = { ...initialBoard[cell] };
      }
    }

    function cellColor(fileIndex, rank) {
      return ((fileIndex + rank) % 2 === 0) ? "dark" : "light";
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      const files = ["A", "B", "C", "D", "E", "F", "G", "H"];

      for (let rank = 8; rank >= 1; rank--) {
        for (let f = 0; f < files.length; f++) {
          const file = files[f];
          const cell = `${file}${rank}`;
          const square = document.createElement("div");

          square.className = `cell ${cellColor(f, rank)}`;
          square.dataset.cell = cell;

          if (cell === selectedStart) {
            square.classList.add("selected");
          }

          if (cell === selectedEnd) {
            square.classList.add("target");
          }

          const piece = boardState[cell];

          if (piece) {
            const span = document.createElement("span");
            span.className = `piece ${piece.color}`;
            span.textContent = piece.symbol;
            square.appendChild(span);
          }

          square.addEventListener("click", () => handleCellClick(cell));
          boardEl.appendChild(square);
        }
      }

      updatePanel();
    }

    function handleCellClick(cell) {
      if (!selectedStart) {
        if (!boardState[cell]) {
          log(`빈 칸 ${cell}은 시작 칸으로 선택할 수 없음`);
          return;
        }

        selectedStart = cell;
        selectedEnd = null;
        renderBoard();
        return;
      }

      if (cell === selectedStart) {
        resetSelection();
        return;
      }

      selectedEnd = cell;
      renderBoard();
    }

    function updatePanel() {
      startText.textContent = selectedStart || "없음";
      endText.textContent = selectedEnd || "없음";

      if (selectedStart && boardState[selectedStart]) {
        const piece = boardState[selectedStart];
        pieceText.textContent = `${piece.color} ${piece.type} ${piece.symbol}`;
      } else {
        pieceText.textContent = "없음";
      }
    }

    function resetSelection() {
      selectedStart = null;
      selectedEnd = null;
      renderBoard();
      log("selection reset");
    }

    function resetBoard() {
      cloneInitialBoard();
      selectedStart = null;
      selectedEnd = null;
      renderBoard();
      log("board reset");
    }

    function log(message) {
      logEl.textContent = message;
    }

    async function sendMove() {
      if (!selectedStart || !selectedEnd) {
        alert("시작 칸과 도착 칸을 선택하셈");
        return;
      }

      const movingPiece = boardState[selectedStart];

      if (!movingPiece) {
        alert("시작 칸에 기물이 없음");
        return;
      }

      const payload = {
        start: selectedStart,
        end: selectedEnd,
        piece: movingPiece.type,
      };

      log(`executing ${payload.start} -> ${payload.end} (${payload.piece}) ...`);

      try {
        const res = await fetch("/execute", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          log("ERROR\n" + JSON.stringify(data, null, 2));
          return;
        }

        boardState[selectedEnd] = boardState[selectedStart];
        delete boardState[selectedStart];

        selectedStart = null;
        selectedEnd = null;
        renderBoard();

        log("SUCCESS\n" + JSON.stringify(data, null, 2));
      } catch (err) {
        log("FETCH ERROR\n" + err);
      }
    }

    cloneInitialBoard();
    renderBoard();
  </script>
</body>
</html>
