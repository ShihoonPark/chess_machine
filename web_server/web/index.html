<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Dual-Arm Chess Robot</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #202124;
      color: #f1f1f1;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }

    .board-wrap {
      display: grid;
      grid-template-columns: 28px 640px;
      grid-template-rows: 640px 28px;
      gap: 4px;
      user-select: none;
    }

    .rank-labels {
      display: grid;
      grid-template-rows: repeat(8, 1fr);
      height: 640px;
    }

    .rank-labels div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #ddd;
    }

    .file-labels {
      grid-column: 2;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: 640px;
    }

    .file-labels div {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #ddd;
    }

    .board {
      width: 640px;
      height: 640px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 4px solid #111;
      box-shadow: 0 0 20px rgba(0,0,0,0.45);
    }

    .cell {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      cursor: pointer;
      position: relative;
    }

    .light {
      background: #f2efe7;
    }

    .dark {
      background: #2f7d55;
    }

    .cell.selected {
      outline: 5px solid #ffd84d;
      outline-offset: -5px;
    }

    .cell.target {
      outline: 5px solid #ff8a4d;
      outline-offset: -5px;
    }

    .cell:hover {
      filter: brightness(1.08);
    }

    .piece.white {
      color: #ffffff;
      text-shadow:
        -2px -2px 0 #333,
         2px -2px 0 #333,
        -2px  2px 0 #333,
         2px  2px 0 #333;
    }

    .piece.black {
      color: #333333;
      text-shadow:
        -1px -1px 0 #999,
         1px -1px 0 #999,
        -1px  1px 0 #999,
         1px  1px 0 #999;
    }

    .panel {
      width: 430px;
      background: #2b2c2f;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .panel h2 {
      margin-top: 0;
    }

    .info {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      min-width: 80px;
      color: #ffd84d;
      font-weight: bold;
    }

    button {
      padding: 12px 18px;
      margin: 6px 4px 6px 0;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4f8cff;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #3976e6;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.secondary {
      background: #666;
    }

    button.secondary:hover {
      background: #777;
    }

    button.danger {
      background: #c94f4f;
    }

    button.danger:hover {
      background: #b43f3f;
    }

    #log {
      margin-top: 16px;
      background: #111;
      color: #ddd;
      padding: 14px;
      border-radius: 10px;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .note {
      color: #ccc;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 12px;
    }

    .note strong {
      color: #ffd84d;
    }

    code {
      color: #e6e6e6;
      background: #1b1c1f;
      padding: 1px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="left">
    <h1>Dual-Arm Chess Robot</h1>

    <div class="board-wrap">
      <div class="rank-labels">
        <div>8</div>
        <div>7</div>
        <div>6</div>
        <div>5</div>
        <div>4</div>
        <div>3</div>
        <div>2</div>
        <div>1</div>
      </div>

      <div id="board" class="board"></div>

      <div></div>

      <div class="file-labels">
        <div>a</div>
        <div>b</div>
        <div>c</div>
        <div>d</div>
        <div>e</div>
        <div>f</div>
        <div>g</div>
        <div>h</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>Move Controller</h2>

    <div class="info">
      <div><span class="badge">Start</span> <span id="startText">없음</span></div>
      <div><span class="badge">End</span> <span id="endText">없음</span></div>
      <div><span class="badge">Piece</span> <span id="pieceText">없음</span></div>
      <div><span class="badge">Turn</span> <span id="turnText">확인 중</span></div>
    </div>

    <button id="moveBtn" onclick="sendMove()">Move</button>
    <button id="selectionResetBtn" class="secondary" onclick="resetSelection()">Selection Reset</button>
    <button id="boardResetBtn" class="danger" onclick="resetBoard()">Board Reset</button>

    <div class="note">
      <strong>TOPST D3 rule checker</strong>와 <strong>ROS2 dual Mirobot control</strong>이 연동된 체스 로봇 데모입니다.<br>
      기물을 선택한 뒤 목적지를 선택하면 TOPST가 현재 보드 상태와 이동 규칙을 검사하고,
      유효한 이동일 때만 로봇팔이 실제 기물을 이동합니다.<br>
      이 화면은 TOPST의 <code>board_state</code>를 기준으로 동기화됩니다.
    </div>

    <div id="log">log...</div>
  </div>

  <script>
    const boardEl = document.getElementById("board");
    const startText = document.getElementById("startText");
    const endText = document.getElementById("endText");
    const pieceText = document.getElementById("pieceText");
    const turnText = document.getElementById("turnText");
    const logEl = document.getElementById("log");

    const moveBtn = document.getElementById("moveBtn");
    const selectionResetBtn = document.getElementById("selectionResetBtn");
    const boardResetBtn = document.getElementById("boardResetBtn");

    let selectedStart = null;
    let selectedEnd = null;
    let boardState = {};
    let currentTurn = "unknown";
    let currentPending = "unknown";
    let busy = false;

    const initialBoard = {
      A1: { symbol: "♖", type: "rook", color: "white" },
      B1: { symbol: "♘", type: "knight", color: "white" },
      C1: { symbol: "♗", type: "bishop", color: "white" },
      D1: { symbol: "♕", type: "queen", color: "white" },
      E1: { symbol: "♔", type: "king", color: "white" },
      F1: { symbol: "♗", type: "bishop", color: "white" },
      G1: { symbol: "♘", type: "knight", color: "white" },
      H1: { symbol: "♖", type: "rook", color: "white" },

      A2: { symbol: "♙", type: "pawn", color: "white" },
      B2: { symbol: "♙", type: "pawn", color: "white" },
      C2: { symbol: "♙", type: "pawn", color: "white" },
      D2: { symbol: "♙", type: "pawn", color: "white" },
      E2: { symbol: "♙", type: "pawn", color: "white" },
      F2: { symbol: "♙", type: "pawn", color: "white" },
      G2: { symbol: "♙", type: "pawn", color: "white" },
      H2: { symbol: "♙", type: "pawn", color: "white" },

      A8: { symbol: "♜", type: "rook", color: "black" },
      B8: { symbol: "♞", type: "knight", color: "black" },
      C8: { symbol: "♝", type: "bishop", color: "black" },
      D8: { symbol: "♛", type: "queen", color: "black" },
      E8: { symbol: "♚", type: "king", color: "black" },
      F8: { symbol: "♝", type: "bishop", color: "black" },
      G8: { symbol: "♞", type: "knight", color: "black" },
      H8: { symbol: "♜", type: "rook", color: "black" },

      A7: { symbol: "♟", type: "pawn", color: "black" },
      B7: { symbol: "♟", type: "pawn", color: "black" },
      C7: { symbol: "♟", type: "pawn", color: "black" },
      D7: { symbol: "♟", type: "pawn", color: "black" },
      E7: { symbol: "♟", type: "pawn", color: "black" },
      F7: { symbol: "♟", type: "pawn", color: "black" },
      G7: { symbol: "♟", type: "pawn", color: "black" },
      H7: { symbol: "♟", type: "pawn", color: "black" },
    };

    const pieceSymbols = {
      white: {
        king: "♔",
        queen: "♕",
        rook: "♖",
        bishop: "♗",
        knight: "♘",
        pawn: "♙",
      },
      black: {
        king: "♚",
        queen: "♛",
        rook: "♜",
        bishop: "♝",
        knight: "♞",
        pawn: "♟",
      },
    };

    function cloneInitialBoard() {
      boardState = {};
      for (const cell in initialBoard) {
        boardState[cell] = { ...initialBoard[cell] };
      }
      currentTurn = "white";
      currentPending = "none";
    }

    function setBusy(value) {
      busy = value;
      moveBtn.disabled = value;
      selectionResetBtn.disabled = value;
      boardResetBtn.disabled = value;
    }

    function cellColor(fileIndex, rank) {
      return ((fileIndex + rank) % 2 === 0) ? "dark" : "light";
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      const files = ["A", "B", "C", "D", "E", "F", "G", "H"];

      for (let rank = 8; rank >= 1; rank--) {
        for (let f = 0; f < files.length; f++) {
          const file = files[f];
          const cell = `${file}${rank}`;
          const square = document.createElement("div");

          square.className = `cell ${cellColor(f, rank)}`;
          square.dataset.cell = cell;

          if (cell === selectedStart) {
            square.classList.add("selected");
          }

          if (cell === selectedEnd) {
            square.classList.add("target");
          }

          const piece = boardState[cell];

          if (piece) {
            const span = document.createElement("span");
            span.className = `piece ${piece.color}`;
            span.textContent = piece.symbol;
            square.appendChild(span);
          }

          square.addEventListener("click", () => handleCellClick(cell));
          boardEl.appendChild(square);
        }
      }

      updatePanel();
    }

    function handleCellClick(cell) {
      if (busy) {
        log("처리 중임. 잠깐 기다려줘.");
        return;
      }

      if (!selectedStart) {
        if (!boardState[cell]) {
          log(`빈 칸 ${cell}은 시작 칸으로 선택할 수 없음`);
          return;
        }

        selectedStart = cell;
        selectedEnd = null;
        renderBoard();
        return;
      }

      if (cell === selectedStart) {
        resetSelection();
        return;
      }

      selectedEnd = cell;
      renderBoard();
    }

    function updatePanel() {
      startText.textContent = selectedStart || "없음";
      endText.textContent = selectedEnd || "없음";

      if (selectedStart && boardState[selectedStart]) {
        const piece = boardState[selectedStart];
        pieceText.textContent = `${piece.color} ${piece.type} ${piece.symbol}`;
      } else {
        pieceText.textContent = "없음";
      }

      if (currentPending && currentPending !== "none") {
        turnText.textContent = `${currentTurn} / pending=${currentPending}`;
      } else {
        turnText.textContent = currentTurn || "unknown";
      }
    }

    function resetSelection() {
      if (busy) {
        return;
      }

      selectedStart = null;
      selectedEnd = null;
      renderBoard();
      log("selection reset");
    }

    function log(message) {
      logEl.textContent = message;
    }

    function pieceFromTopstValue(value) {
      const parts = value.split("_");
      const color = parts[0];
      const type = parts.slice(1).join("_");

      if (!pieceSymbols[color] || !pieceSymbols[color][type]) {
        return {
          symbol: "?",
          type: type || "unknown",
          color: color || "unknown",
        };
      }

      return {
        symbol: pieceSymbols[color][type],
        type,
        color,
      };
    }

    function parseTopstBoardResponse(responseText) {
      const nextBoard = {};
      let nextTurn = "unknown";
      let nextPending = "unknown";

      const tokens = responseText.trim().split(/\s+/);

      for (const token of tokens) {
        if (token.startsWith("turn=")) {
          nextTurn = token.slice("turn=".length);
          continue;
        }

        if (token.startsWith("pending=")) {
          nextPending = token.slice("pending=".length);
          continue;
        }

        if (/^[A-H][1-8]:/.test(token)) {
          const pair = token.split(":");
          const cell = pair[0];
          const pieceValue = pair[1];

          if (cell && pieceValue) {
            nextBoard[cell] = pieceFromTopstValue(pieceValue);
          }
        }
      }

      return {
        board: nextBoard,
        turn: nextTurn,
        pending: nextPending,
      };
    }

    async function readJsonResponse(res) {
      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        return {
          status: "error",
          raw_text: text,
        };
      }
    }

    async function loadBoardFromTopst(showLog = true) {
      if (showLog) {
        log("TOPST board sync...");
      }

      const res = await fetch("/topst/board", {
        method: "GET",
        cache: "no-store",
      });

      const data = await readJsonResponse(res);

      if (!res.ok) {
        throw new Error(JSON.stringify(data, null, 2));
      }

      if (!data.response) {
        throw new Error("TOPST board response is empty: " + JSON.stringify(data, null, 2));
      }

      const parsed = parseTopstBoardResponse(data.response);

      boardState = parsed.board;
      currentTurn = parsed.turn;
      currentPending = parsed.pending;

      selectedStart = null;
      selectedEnd = null;
      renderBoard();

      if (showLog) {
        log("BOARD SYNC SUCCESS\n" + data.response);
      }

      return data;
    }

    async function resetBoard() {
      if (busy) {
        return;
      }

      setBusy(true);
      log("TOPST board reset...");

      try {
        const res = await fetch("/topst/reset", {
          method: "POST",
          cache: "no-store",
        });

        const data = await readJsonResponse(res);

        if (!res.ok) {
          log("TOPST RESET ERROR\n" + JSON.stringify(data, null, 2));
          return;
        }

        const boardData = await loadBoardFromTopst(false);

        log(
          "TOPST RESET SUCCESS\n" +
          JSON.stringify(data, null, 2) +
          "\n\nBOARD SYNC\n" +
          boardData.response
        );
      } catch (err) {
        log("TOPST RESET FETCH ERROR\n" + err);
      } finally {
        setBusy(false);
      }
    }

    async function sendMove() {
      if (busy) {
        return;
      }

      if (!selectedStart || !selectedEnd) {
        alert("시작 칸과 도착 칸을 선택하셈");
        return;
      }

      const movingPiece = boardState[selectedStart];

      if (!movingPiece) {
        alert("시작 칸에 기물이 없음");
        return;
      }

      const payload = {
        start: selectedStart,
        end: selectedEnd,
        piece: movingPiece.type,
      };

      setBusy(true);
      log(`executing ${payload.start} -> ${payload.end} (${payload.piece}) ...`);

      try {
        const res = await fetch("/execute", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          cache: "no-store",
          body: JSON.stringify(payload),
        });

        const data = await readJsonResponse(res);

        if (!res.ok) {
          let message = "ERROR\n" + JSON.stringify(data, null, 2);

          try {
            const boardData = await loadBoardFromTopst(false);
            message += "\n\nBOARD SYNC AFTER ERROR\n" + boardData.response;
          } catch (syncErr) {
            message += "\n\nBOARD SYNC FAILED\n" + syncErr;
          }

          log(message);
          return;
        }

        const boardData = await loadBoardFromTopst(false);

        log(
          "SUCCESS\n" +
          JSON.stringify(data, null, 2) +
          "\n\nBOARD SYNC\n" +
          boardData.response
        );
      } catch (err) {
        log("FETCH ERROR\n" + err);
      } finally {
        setBusy(false);
      }
    }

    cloneInitialBoard();
    renderBoard();

    loadBoardFromTopst(true).catch((err) => {
      log(
        "BOARD SYNC ERROR\n" +
        err +
        "\n\n로컬 초기 보드가 임시로 표시되고 있음. TOPST rule_checker 또는 /topst/board 상태를 확인해야 함."
      );
    });
  </script>
</body>
</html>
