mirobot_order_delivery_node:
  ros__parameters:
    topics.robot_cmd: "/robot/cmd"
    topics.robot_stop: "/robot/stop"
    topics.robot_done: "/robot/done"
    topics.robot_status: "/robot/status"

    serial.port: "/dev/ttyUSB0"
    serial.baud: 115200
    serial.eol: "\\r\\n"
    serial.command_timeout_s: 12.0
    serial.toggle_dtr_rts: true
    serial.verbose_tx: true

    # Keep this conservative first. X=0 caused/risks soft-limit in your logs.
    workspace.x_min: 0.0
    workspace.x_max: 290.0
    workspace.y_min: -270.0
    workspace.y_max: 270.0
    workspace.z_min: 40.0
    workspace.z_max: 300.0

    camera.id: 4
    camera.backend: "v4l2"
    camera.width: 1280
    camera.height: 720
    camera.settle_s: 0.4
    camera.flush_frames: 3

    yolo.repo: "/home/kjy/yolov5"
    yolo.weight: "/home/kjy/yolov5/runs/train/exp/weights/best.onnx"
    yolo.conf: 0.50
    yolo.iou: 0.45
    yolo.size: 640

    calibration.mode: "dynamic"
    calibration.use_static: false
    calibration.static_board_path: ""
    calibration.fallback_origin_u: 640.0
    calibration.fallback_origin_v: 360.0
    calibration.fallback_origin_x: 200.0
    calibration.fallback_origin_y: 0.0
    # 0.50 made X jump to ~95 in your log. Start with 0.25, then tune slowly.
    calibration.fallback_mm_per_px: 0.20
    calibration.dynamic_rotation_deg: 0.0
    # If camera opens as 640x480 but origin is 640,360, auto switch origin to 320,240.
    calibration.auto_origin_if_invalid: true

    poses.observe_xyz: [200.0, 0.0, 220.0]
    # Safer test drop point. If you really need X=0, verify with manual XYZ first,
    # then lower workspace.x_min and box_xyz.x gradually.
    poses.box_xyz: [0.0, 250.0, 170.0]
    poses.pick_z: 55.0
    poses.travel_z: 220.0
    poses.box_approach_z: 220.0
    poses.pick_x_offset_mm: 10.0
    poses.pick_y_offset_mm: 5.0

    motion.feed: 2000.0
    motion.arc_points: 30
    # M400 produced `Invalid gcode ID:23` on your Mirobot firmware.
    motion.use_m400: false
    motion.use_status_wait: false
    motion.settle_after_move_s: 0.20
    motion.status_wait_timeout_s: 1.0

    pump.pwm: 1000
    pump.pick_dwell_s: 1.5
    pump.drop_dwell_s: 0.4

    task.order_sequence: ["red", "green", "blue"]
    task.detect_timeout_s: 5.0
    task.detect_min_hits: 1
    task.return_to_observe_after_each_cube: true
    task.pack_passthrough: true
    task.publish_failed_done: false
    task.allow_fixed_pick_fallback: false

    fixed_pick.red_xyz: [140.0, -90.0, 55.0]
    fixed_pick.green_xyz: [140.0, 0.0, 55.0]
    fixed_pick.blue_xyz: [140.0, 90.0, 55.0]

    box_grid.enabled: false
    box_grid.cols: 3
    box_grid.step_mm: 24.0
    box_grid.axis: "y"

    debug.view: false
    debug.window_name: "mirobot_order_delivery"
    debug.max_width: 960
    debug.save_latest_frame: true
    debug.frame_path: "/tmp/mirobot_order_delivery_debug_latest.jpg"
    debug.save_interval_s: 0.5
